name: Keep Scheduled Workflows Active

on:
  schedule:
    # Keep repository activity fresh so GitHub does not disable scheduled workflows for inactivity.
    - cron: "15 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Create empty keepalive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep scheduled workflows active"
          git push
